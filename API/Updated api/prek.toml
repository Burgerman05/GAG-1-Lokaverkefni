[[repos]]
repo = "local"
hooks = [
    {
        id = "ruff-check",
        name = "ruff check",
        language = "system",
        entry = "ruff check",
        files = "\\.py$"
    },
    {
        id = "ruff-format",
        name = "ruff format",
        language = "system",
        entry = "ruff format",
        files = "\\.py$"
    },
]
